<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC AI-Trading Terminal v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { chartDark: '#0B0E14', chartCard: '#131722', chartBorder: '#2A2E39', chartText: '#D1D4DC', chartAccent: '#2962FF', chartGreen: '#089981', chartRed: '#F23645' } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0B0E14; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #131722; }
        ::-webkit-scrollbar-thumb { background: #2A2E39; border-radius: 3px; }
    </style>
</head>
<body class="text-chartText min-h-screen flex flex-col">

    <nav class="bg-chartCard border-b border-chartBorder px-4 py-3 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold text-white flex items-center gap-2"><i class="fa-solid fa-brain-circuit text-chartAccent"></i> SMC AI-Terminal</h1>
            <div class="flex items-center gap-2">
                <input type="password" id="apiKeyInput" placeholder="Gemini API Key..." class="bg-chartDark border border-chartBorder rounded-lg py-1.5 px-3 text-xs w-48">
                <button onclick="saveApiKey()" class="bg-chartAccent text-white text-xs px-4 py-2 rounded-lg font-semibold">Save Key</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 w-full flex-grow grid grid-cols-1 lg:grid-cols-12 gap-6">
        <section class="lg:col-span-5 flex flex-col gap-6">
            <div class="bg-chartCard border border-chartBorder rounded-xl p-5">
                <h2 class="text-sm font-bold text-white mb-4"><i class="fa-solid fa-book-bookmark text-chartAccent"></i> Knowledge Base</h2>
                <input type="file" id="fileInput" multiple accept=".pdf,.txt" class="hidden" onchange="handleFileUpload(event)">
                <button onclick="document.getElementById('fileInput').click()" class="w-full border-2 border-dashed border-chartBorder rounded-lg py-3 text-xs text-gray-400">Upload PDF/TXT Files</button>
                <div id="fileList" class="mt-2 text-[10px] text-gray-500"></div>
                <textarea id="tradingRulesText" rows="5" class="w-full mt-3 bg-chartDark border border-chartBorder rounded-lg p-3 text-xs" placeholder="Manual rules..."></textarea>
            </div>

            <div class="bg-chartCard border border-chartBorder rounded-xl p-5">
                <h2 class="text-sm font-bold text-white mb-4">Config Assets & TF</h2>
                <select id="pairSelect" onchange="onPairChanged()" class="w-full bg-chartDark border border-chartBorder rounded-lg p-2 text-xs mb-4">
                    <option value="BTCUSD">BTC/USD</option>
                    <option value="ETHUSD">ETH/USD</option>
                    <option value="NAS100">NAS100</option>
                </select>
                <div id="tfSelectorContainer" class="grid grid-cols-3 gap-2 text-[10px]">
                    <label><input type="checkbox" id="chkD1" checked> D1</label>
                    <label><input type="checkbox" id="chkH4" checked> H4</label>
                    <label><input type="checkbox" id="chkH1" checked> H1</label>
                    <label><input type="checkbox" id="chkM30" checked> M30</label>
                    <label><input type="checkbox" id="chkM15" checked> M1
